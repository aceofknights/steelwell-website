<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seating Chart</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <!-- Link to external CSS file -->
  </head>
  <body>
    <!-- <div class="SeatingChartHeader"><h1>Seating Chart</h1></div> -->
    <button id="fullscreenClassroomBtn">
      Fullscreen Press ESC to close and R for random seating
    </button>

    <div id="bulk-add-container" style="margin-bottom: 16px">
      <textarea
        id="bulk-add-textarea"
        rows="4"
        placeholder="Paste student names here, one per line..."
        style="width: 100%"
      ></textarea>
      <div id="bulk-group-row">
        <label for="bulkGroupSelect">Add to:</label>
        <select id="bulkGroupSelect"></select>
      </div>
      <button id="bulk-add-btn" style="margin-top: 8px">Add Students</button>
    </div>

    <button id="addTableBtn">Add New Table</button>
    <div id="classSelectorContainer">
      <label for="classSelector">Class:</label>
      <select id="classSelector"></select>
      <button id="addClassBtn">+ Add Class</button>
      <button id="deleteClassBtn">🗑️ Delete Class</button>
      <!-- New button -->
    </div>
    <div id="layoutSelectorContainer">
      <label for="layoutSelector">Layout:</label>
      <select id="layoutSelector"></select>
      <button id="saveLayoutBtn">Save Layout</button>
      <button id="addLayoutBtn">+ New Layout</button>
      <button id="deleteLayoutBtn">Delete Layout</button>
    </div>
    <div id="chartModeContainer">
      <label for="layoutModeSelect">Mode:</label>
      <select id="layoutModeSelect">
        <option value="table">Table</option>
        <option value="grid">Grid</option>
      </select>
      <div id="gridControls">
        <label for="gridRowsInput">Rows</label>
        <input id="gridRowsInput" type="number" min="1" step="1" value="5" />
        <label for="gridColumnsInput">Columns</label>
        <input id="gridColumnsInput" type="number" min="1" step="1" value="6" />
        <label for="gridRowGapInput">Row gap</label>
        <input id="gridRowGapInput" type="number" min="0" step="1" value="8" />
        <label for="gridColumnGapInput">Column gap</label>
        <input id="gridColumnGapInput" type="number" min="0" step="1" value="8" />
      </div>
    </div>
    <div id="listAndChart">
      <button id="toggleStudentListBtn">☰</button>
      <!-- Moved outside -->
      <div id="studentListContainer">
        <div id="studentGroupControls"></div>
        <ul id="studentList">
          <!-- Student list items -->
        </ul>
      </div>
      <div id="classroom"></div>
    </div>

    <!-- <div id="nameInputDiv">
      <input
        type="text"
        name="studentName"
        id="studentName"
        placeholder="Enter a student name"
      />
      <button id="addNameBtn">Add Name</button>
    </div> -->

    <script src="../javascript/Seating_Chart.js"></script>
  </body>
</html>
